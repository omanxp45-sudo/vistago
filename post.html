<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>رفع صورة</title>

<style>
body{background:#0f0f0f;color:#fff;font-family:sans-serif;text-align:center}
.container{max-width:400px;margin:auto;padding:20px}
.upload-box{border:2px dashed #555;padding:30px;cursor:pointer}
img{width:100%;margin-top:10px;border-radius:10px}
textarea{width:100%;margin-top:10px;padding:10px}
button{margin-top:10px;padding:10px;width:100%}
</style>
</head>
<body>

<div class="container">
  <h2>📸 نشر صورة</h2>

  <div class="upload-box" onclick="pickImage()">اختر صورة</div>

  <input type="file" id="fileInput" hidden>

  <img id="preview" style="display:none">

  <textarea id="caption" placeholder="اكتب وصف..."></textarea>

  <button onclick="uploadPost()">نشر</button>

  <div id="progress"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>

<script>
firebase.initializeApp({
  apiKey:"AIzaSyA4vNgF3NBWxjQfx_feHpsoIMdswlzUegA",
  authDomain:"social-media-app-da2cd.firebaseapp.com",
  projectId:"social-media-app-da2cd",
  storageBucket:"social-media-app-da2cd.appspot.com",
  appId:"1:41413182238:web:bbf664b131279ec4bd3f0f"
});

const auth = firebase.auth();
const db = firebase.firestore();
const storage = firebase.storage();

let file;

// حماية الصفحة
auth.onAuthStateChanged(user=>{
  if(!user){
    alert("سجل دخول أولاً");
    window.location.href = "index.html";
  }
});

function pickImage(){
  document.getElementById("fileInput").click();
}

document.getElementById("fileInput").onchange = e=>{
  file = e.target.files[0];

  const reader = new FileReader();
  reader.onload = e=>{
    const img = document.getElementById("preview");
    img.src = e.target.result;
    img.style.display="block";
  };
  reader.readAsDataURL(file);
};

function uploadPost(){
  const user = auth.currentUser;
  if(!file){ alert("اختر صورة"); return; }

  const caption = document.getElementById("caption").value;

  const ref = storage.ref("posts/"+Date.now());
  const task = ref.put(file);

  task.on("state_changed",
    s=>{
      const p = Math.floor((s.bytesTransferred/s.totalBytes)*100);
      document.getElementById("progress").textContent = p+"%";
    },
    err=>alert("خطأ"),
    ()=>{
      task.snapshot.ref.getDownloadURL().then(url=>{

        db.collection("posts").add({
          image:url,
          caption:caption,
          name:user.displayName || "مستخدم",
          uid:user.uid,
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });

        alert("تم النشر 🎉");
        window.location.href="index.html";
      });
    }
  );
}
</script>

</body>
</html>
