<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="bodymain" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#0088ee"/>
    <stop offset="50%" stop-color="#0055bb"/>
    <stop offset="100%" stop-color="#003388"/>
  </linearGradient>
  <linearGradient id="edgeshadow" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#00000030"/>
    <stop offset="8%" stop-color="#00000000"/>
    <stop offset="92%" stop-color="#00000000"/>
    <stop offset="100%" stop-color="#00000035"/>
  </linearGradient>
  <linearGradient id="chrome" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#ffffff"/>
    <stop offset="25%" stop-color="#d8d8d8"/>
    <stop offset="50%" stop-color="#808080"/>
    <stop offset="75%" stop-color="#d8d8d8"/>
    <stop offset="100%" stop-color="#ffffff"/>
  </linearGradient>
  <radialGradient id="glass" cx="35%" cy="30%" r="70%">
    <stop offset="0%" stop-color="#3a6aaf"/>
    <stop offset="20%" stop-color="#1a3a7a"/>
    <stop offset="45%" stop-color="#0a1a40"/>
    <stop offset="70%" stop-color="#050a20"/>
    <stop offset="100%" stop-color="#010306"/>
  </radialGradient>
  <radialGradient id="gloss" cx="25%" cy="20%" r="55%">
    <stop offset="0%" stop-color="white" stop-opacity="0.85"/>
    <stop offset="45%" stop-color="#c8e8ff" stop-opacity="0.3"/>
    <stop offset="100%" stop-color="white" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="pupil" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#1a3060"/>
    <stop offset="50%" stop-color="#060e20"/>
    <stop offset="100%" stop-color="#010408"/>
  </radialGradient>
  <radialGradient id="sglass" cx="35%" cy="30%" r="65%">
    <stop offset="0%" stop-color="#4a7abf"/>
    <stop offset="40%" stop-color="#0d2050"/>
    <stop offset="100%" stop-color="#010408"/>
  </radialGradient>
  <radialGradient id="sgloss" cx="25%" cy="20%" r="50%">
    <stop offset="0%" stop-color="white" stop-opacity="0.7"/>
    <stop offset="100%" stop-color="white" stop-opacity="0"/>
  </radialGradient>
</defs>

<!-- Red frame outer -->
<rect x="6" y="6" width="500" height="500" rx="90" fill="#cc0000"/>

<!-- Camera body -->
<rect x="18" y="18" width="476" height="476" rx="80" fill="url(#bodymain)"/>
<rect x="18" y="18" width="476" height="476" rx="80" fill="url(#edgeshadow)"/>

<!-- Body top shine -->
<rect x="18" y="18" width="476" height="80" rx="80" fill="white" opacity="0.12"/>

<!-- VISTAGO text -->
<text x="220" y="110" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="36px" fill="white" letter-spacing="8" opacity="0.9">VISTAGO</text>

<!-- MAIN ROUND LENS -->
<circle cx="210" cy="300" r="155" fill="#002266"/>
<circle cx="210" cy="296" r="155" fill="url(#chrome)"/>
<circle cx="210" cy="296" r="140" fill="#111"/>
<circle cx="210" cy="296" r="130" fill="url(#glass)"/>
<circle cx="210" cy="296" r="112" fill="none" stroke="#1a3060" stroke-width="3" opacity="0.5"/>
<circle cx="210" cy="296" r="96" fill="url(#pupil)"/>
<circle cx="210" cy="296" r="70" fill="#040810"/>
<circle cx="210" cy="296" r="42" fill="#020508"/>
<circle cx="210" cy="296" r="20" fill="#010204"/>
<circle cx="210" cy="296" r="130" fill="#3060c0" opacity="0.06"/>
<circle cx="210" cy="296" r="130" fill="url(#gloss)"/>
<!-- Main lens highlights -->
<ellipse cx="167" cy="254" rx="35" ry="22" fill="white" opacity="0.65" transform="rotate(-50 167 254)"/>
<circle cx="175" cy="262" r="14" fill="white" opacity="0.75"/>
<circle cx="160" cy="247" r="7" fill="white" opacity="0.5"/>
<!-- Screws -->
<circle cx="210" cy="148" r="8" fill="url(#chrome)"/>
<circle cx="210" cy="148" r="4" fill="#606060"/>
<circle cx="210" cy="444" r="8" fill="url(#chrome)"/>
<circle cx="210" cy="444" r="4" fill="#606060"/>
<circle cx="62" cy="296" r="8" fill="url(#chrome)"/>
<circle cx="62" cy="296" r="4" fill="#606060"/>
<circle cx="358" cy="296" r="8" fill="url(#chrome)"/>
<circle cx="358" cy="296" r="4" fill="#606060"/>

<!-- SQUARE LENS top right -->
<rect x="368" y="148" width="110" height="110" rx="22" fill="#002266"/>
<rect x="364" y="144" width="110" height="110" rx="22" fill="url(#chrome)"/>
<rect x="374" y="154" width="90" height="90" rx="16" fill="#111"/>
<rect x="380" y="160" width="78" height="78" rx="12" fill="url(#sglass)"/>
<rect x="390" y="170" width="58" height="58" rx="8" fill="none" stroke="#1a3060" stroke-width="2" opacity="0.5"/>
<circle cx="419" cy="199" r="20" fill="url(#pupil)"/>
<circle cx="419" cy="199" r="12" fill="#040810"/>
<circle cx="419" cy="199" r="5" fill="#020508"/>
<rect x="380" y="160" width="78" height="78" rx="12" fill="url(#sgloss)"/>
<ellipse cx="390" cy="168" rx="14" ry="9" fill="white" opacity="0.6" transform="rotate(-40 390 168)"/>
<circle cx="394" cy="172" r="5" fill="white" opacity="0.65"/>
</svg>
