<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vistago — Create Post</title>
<link rel="icon" href="vistago-icon.svg" type="image/svg+xml">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<style>
  :root { --bg:#0f0f0f; --surface:#1a1a1a; --surface2:#242424; --border:#2e2e2e; --text:#f0f0f0; --text2:#aaaaaa; --radius:14px; }
  :root.light { --bg:#f4f4f8; --surface:#ffffff; --surface2:#efefef; --border:#dcdcdc; --text:#111111; --text2:#666666; }
  * { box-sizing:border-box; margin:0; padding:0; }
  html,body { margin:0; padding:0; width:100%; }
  body { background:var(--bg); color:var(--text); font-family:'Segoe UI',sans-serif; min-height:100vh; }

  nav { position:sticky; top:0; left:0; right:0; z-index:100; background:#1DA1F2; height:56px; width:100%; display:flex; align-items:center; justify-content:center; }
  .nav-inner { width:100%; max-width:560px; display:flex; align-items:center; justify-content:space-between; padding:0 16px; }
  .nav-left { display:flex; align-items:center; gap:10px; }
  .nav-back { background:rgba(255,255,255,0.2); border:1px solid rgba(255,255,255,0.4); color:#fff; border-radius:50%; width:34px; height:34px; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:1.1rem; }
  .nav-title { font-weight:700; font-size:1rem; color:#fff; }
  .nav-right { display:flex; align-items:center; gap:6px; }
  .theme-btn { background:rgba(255,255,255,0.2); border:1px solid rgba(255,255,255,0.4); color:#fff; border-radius:20px; padding:5px 10px; font-size:0.9rem; cursor:pointer; }
  .lang-btns { display:flex; gap:4px; }
  .lang-btn { background:rgba(255,255,255,0.2); border:1px solid rgba(255,255,255,0.4); color:#fff; border-radius:20px; padding:4px 8px; font-size:0.72rem; cursor:pointer; }
  .lang-btn.active { background:rgba(255,255,255,0.4); }
  @media(max-width:480px){ .lang-btns{display:none;} }

  .page { max-width:560px; margin:0 auto; padding:20px 16px 100px; }
  .lbl { font-size:0.85rem; color:var(--text2); font-weight:600; margin-bottom:8px; }

  .upload-area { border:2px dashed var(--border); border-radius:var(--radius); background:var(--surface); padding:40px 20px; text-align:center; cursor:pointer; position:relative; margin-bottom:16px; }
  .upload-area:hover { border-color:#1DA1F2; }
  .upload-area input { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; }
  .upload-icon { font-size:2.5rem; color:var(--text2); margin-bottom:10px; }
  .upload-title { font-size:0.95rem; font-weight:600; margin-bottom:4px; }
  .upload-sub { font-size:0.8rem; color:var(--text2); }

  .img-preview { display:none; margin-bottom:16px; border-radius:var(--radius); overflow:hidden; background:var(--surface2); text-align:center; position:relative; }
  .img-preview img { max-width:100%; max-height:400px; object-fit:contain; display:block; margin:0 auto; transition:transform 0.3s ease; }
  .img-remove { position:absolute; top:8px; right:8px; background:rgba(0,0,0,0.6); color:#fff; border:none; border-radius:50%; width:32px; height:32px; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:1rem; }
  .rotate-btns { display:flex; justify-content:center; gap:10px; padding:10px; background:var(--surface2); }
  .rotate-btn { background:var(--surface); border:1px solid var(--border); color:var(--text); border-radius:10px; padding:8px 16px; font-size:0.85rem; cursor:pointer; display:flex; align-items:center; gap:6px; }
  .rotate-btn:hover { border-color:#1DA1F2; color:#1DA1F2; }
  .del-btn { background:var(--surface); border:1px solid var(--border); color:var(--text2); border-radius:10px; padding:8px 16px; font-size:0.85rem; cursor:pointer; display:flex; align-items:center; gap:6px; }
  .del-btn:hover { border-color:#ef4444; color:#ef4444; }

  textarea { width:100%; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:14px; color:var(--text); font-size:0.95rem; outline:none; resize:none; font-family:inherit; line-height:1.5; min-height:100px; margin-bottom:4px; }
  textarea:focus { border-color:#1DA1F2; }
  .char-count { font-size:0.75rem; color:var(--text2); margin-bottom:16px; }

  .post-btn { width:100%; background:#1DA1F2; color:#fff; border:none; border-radius:var(--radius); padding:14px; font-size:1rem; font-weight:700; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px; }
  .post-btn:disabled { background:var(--border); color:var(--text2); cursor:not-allowed; }
  .spinner { display:none; width:18px; height:18px; border:2px solid rgba(255,255,255,0.3); border-top-color:#fff; border-radius:50%; animation:spin .7s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }

  .toast { display:none; position:fixed; top:70px; left:50%; transform:translateX(-50%); background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:10px 20px; font-size:0.88rem; z-index:500; box-shadow:0 4px 20px rgba(0,0,0,0.3); white-space:nowrap; }
  .toast.show { display:block; }
  .toast.ok { border-color:#22c55e; color:#4ade80; }
  .toast.err { border-color:#ef4444; color:#f87171; }

  .bottom-nav { position:fixed; bottom:0; left:0; right:0; background:color-mix(in srgb, var(--bg) 92%, transparent); backdrop-filter:blur(12px); border-top:1px solid var(--border); display:flex; justify-content:space-around; align-items:center; padding:8px 0 10px; z-index:100; }
  .bn { display:flex; flex-direction:column; align-items:center; gap:3px; background:none; border:none; color:var(--text2); font-size:0.65rem; cursor:pointer; padding:4px 12px; }
  .bn i { font-size:1.3rem; }
  .bn:hover, .bn.active { color:#1DA1F2; }
</style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <div class="nav-left">
      <button class="nav-back" onclick="window.location.href='index.html'"><i class="bi bi-arrow-left"></i></button>
      <span class="nav-title" id="nav-title">Create Post</span>
    </div>
    <div class="nav-right">
      <button class="theme-btn" id="theme-btn" onclick="toggleTheme()">🌙</button>
      <div class="lang-btns">
        <button class="lang-btn" id="btn-ar" onclick="setLang('ar')">🇸🇦 ع</button>
        <button class="lang-btn active" id="btn-en" onclick="setLang('en')">🇬🇧 EN</button>
      </div>
    </div>
  </div>
</nav>

<div class="page">

  <div class="lbl" id="lbl-photo">📷 Add a photo</div>

  <div class="upload-area" id="upload-area">
    <input type="file" accept="image/*" id="file-input" onchange="onFileChange(this)">
    <div class="upload-icon"><i class="bi bi-image"></i></div>
    <div class="upload-title" id="upload-title">Click to choose a photo</div>
    <div class="upload-sub" id="upload-sub">Or drag and drop here</div>
  </div>

  <div class="img-preview" id="img-preview">
    <button class="img-remove" onclick="clearImg()"><i class="bi bi-x"></i></button>
    <img id="preview-img" src="" alt="preview">
    <div class="rotate-btns">
      <button class="rotate-btn" onclick="rotateImg(-90)"><i class="bi bi-arrow-counterclockwise"></i> <span id="lbl-left">Left</span></button>
      <button class="rotate-btn" onclick="rotateImg(90)"><i class="bi bi-arrow-clockwise"></i> <span id="lbl-right">Right</span></button>
      <button class="del-btn" onclick="clearImg()"><i class="bi bi-trash"></i> <span id="lbl-del">Delete</span></button>
    </div>
  </div>

  <div class="lbl" id="lbl-caption">✏️ Caption</div>
  <textarea id="caption" maxlength="500" placeholder="Write a caption..." oninput="onInput()"></textarea>
  <div class="char-count"><span id="char-count">0</span>/500</div>

  <button class="post-btn" id="post-btn" onclick="doPost()" disabled>
    <div class="spinner" id="spinner"></div>
    <span id="btn-text">🚀 Post</span>
  </button>

</div>

<div class="toast" id="toast"></div>

<div class="bottom-nav">
  <button class="bn" onclick="window.location.href='index.html'"><i class="bi bi-house"></i><span id="bn-home">Home</span></button>
  <button class="bn" onclick="window.location.href='search.html'"><i class="bi bi-search"></i><span id="bn-search">Search</span></button>
  <button class="bn active"><i class="bi bi-plus-square"></i><span id="bn-post">Post</span></button>
  <button class="bn" onclick="window.location.href='notifications.html'"><i class="bi bi-bell"></i><span id="bn-notif">Notifications</span></button>
  <button class="bn" onclick="window.location.href='profile.html'"><i class="bi bi-person"></i><span id="bn-profile">Profile</span></button>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
<script>

firebase.initializeApp({
  apiKey: "AIzaSyA4vNgF3NBWxjQfx_feHpsoIMdswlzUegA",
  authDomain: "social-media-app-da2cd.firebaseapp.com",
  projectId: "social-media-app-da2cd",
  storageBucket: "social-media-app-da2cd.firebasestorage.app",
  messagingSenderId: "41413182238",
  appId: "1:41413182238:web:bbf664b131279ec4bd3f0f"
});

var auth = firebase.auth();
var db = firebase.firestore();
var storage = firebase.storage();
var FieldValue = firebase.firestore.FieldValue;
var currentUser = null;
var selectedFile = null;
var rotation = 0;
var lang = 'en';

var T = {
  en: {
    navTitle:'Create Post', photo:'📷 Add a photo', uploadTitle:'Click to choose a photo',
    uploadSub:'Or drag and drop here', caption:'✏️ Caption', captionPH:'Write a caption...',
    post:'🚀 Post', posting:'Posting...', left:'Left', right:'Right', del:'Delete',
    success:'Your post is live! 🎉', errNoImg:'Please add a photo first',
    errSize:'Image must be under 5MB', errType:'Please select an image file',
    errFail:'Failed to post. Try again.',
    home:'Home', search:'Search', postBtn:'Post', notif:'Notifications', profile:'Profile'
  },
  ar: {
    navTitle:'نشر منشور', photo:'📷 أضف صورة', uploadTitle:'اضغط لاختيار صورة',
    uploadSub:'أو اسحب وأفلت هنا', caption:'✏️ الوصف', captionPH:'اكتب وصفاً...',
    post:'🚀 نشر', posting:'جاري النشر...', left:'يسار', right:'يمين', del:'حذف',
    success:'تم نشر منشورك! 🎉', errNoImg:'أضف صورة أولاً',
    errSize:'الصورة يجب أن تكون أقل من 5MB', errType:'يرجى اختيار صورة',
    errFail:'فشل النشر، حاول مرة أخرى',
    home:'الرئيسية', search:'بحث', postBtn:'نشر', notif:'إشعارات', profile:'حسابي'
  }
};

function setLang(l) {
  lang = l;
  localStorage.setItem('vistagoLang', l);
  var t = T[l];
  document.documentElement.setAttribute('dir', l === 'ar' ? 'rtl' : 'ltr');
  document.documentElement.setAttribute('lang', l);
  document.getElementById('nav-title').textContent = t.navTitle;
  document.getElementById('lbl-photo').textContent = t.photo;
  document.getElementById('upload-title').textContent = t.uploadTitle;
  document.getElementById('upload-sub').textContent = t.uploadSub;
  document.getElementById('lbl-caption').textContent = t.caption;
  document.getElementById('caption').placeholder = t.captionPH;
  document.getElementById('btn-text').textContent = t.post;
  document.getElementById('lbl-left').textContent = t.left;
  document.getElementById('lbl-right').textContent = t.right;
  document.getElementById('lbl-del').textContent = t.del;
  document.getElementById('bn-home').textContent = t.home;
  document.getElementById('bn-search').textContent = t.search;
  document.getElementById('bn-post').textContent = t.postBtn;
  document.getElementById('bn-notif').textContent = t.notif;
  document.getElementById('bn-profile').textContent = t.profile;
  document.getElementById('btn-ar').classList.toggle('active', l === 'ar');
  document.getElementById('btn-en').classList.toggle('active', l === 'en');
}

// Apply saved lang
var savedLang = localStorage.getItem('vistagoLang') || 'en';
setLang(savedLang);

// Theme
function toggleTheme() {
  var light = document.documentElement.classList.toggle('light');
  localStorage.setItem('vistagoTheme', light ? 'light' : 'dark');
  document.getElementById('theme-btn').textContent = light ? '☀️' : '🌙';
}
if (localStorage.getItem('vistagoTheme') === 'light') {
  document.documentElement.classList.add('light');
  document.getElementById('theme-btn').textContent = '☀️';
}

// Toast
function toast(msg, type) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show ' + (type || 'ok');
  setTimeout(function() { el.className = 'toast'; }, 3000);
}

// File select
function onFileChange(input) {
  var file = input.files[0];
  if (!file) return;
  if (!file.type.startsWith('image/')) { toast(T[lang].errType, 'err'); return; }
  if (file.size > 5 * 1024 * 1024) { toast(T[lang].errSize, 'err'); return; }
  selectedFile = file;
  rotation = 0;
  var reader = new FileReader();
  reader.onload = function(e) {
    var img = document.getElementById('preview-img');
    img.src = e.target.result;
    img.style.transform = '';
    document.getElementById('img-preview').style.display = 'block';
    document.getElementById('upload-area').style.display = 'none';
    updateBtn();
  };
  reader.readAsDataURL(file);
}

// Rotate
function rotateImg(deg) {
  rotation = (rotation + deg + 360) % 360;
  document.getElementById('preview-img').style.transform = 'rotate(' + rotation + 'deg)';
}

// Clear image
function clearImg() {
  selectedFile = null;
  rotation = 0;
  var img = document.getElementById('preview-img');
  img.src = '';
  img.style.transform = '';
  document.getElementById('img-preview').style.display = 'none';
  document.getElementById('upload-area').style.display = 'block';
  document.getElementById('file-input').value = '';
  updateBtn();
}

// Caption input
function onInput() {
  document.getElementById('char-count').textContent = document.getElementById('caption').value.length;
  updateBtn();
}

// Update button state
function updateBtn() {
  document.getElementById('post-btn').disabled = !selectedFile;
}

// Drag & drop
var area = document.getElementById('upload-area');
area.addEventListener('dragover', function(e) { e.preventDefault(); area.style.borderColor = '#1DA1F2'; });
area.addEventListener('dragleave', function() { area.style.borderColor = ''; });
area.addEventListener('drop', function(e) {
  e.preventDefault(); area.style.borderColor = '';
  var file = e.dataTransfer.files[0];
  if (file) {
    var dt = new DataTransfer();
    dt.items.add(file);
    document.getElementById('file-input').files = dt.files;
    onFileChange(document.getElementById('file-input'));
  }
});

// Post
function doPost() {
  if (!currentUser) { window.location.href = 'login.html'; return; }
  if (!selectedFile) { toast(T[lang].errNoImg, 'err'); return; }

  var btn = document.getElementById('post-btn');
  var spinner = document.getElementById('spinner');
  var btnText = document.getElementById('btn-text');
  btn.disabled = true;
  spinner.style.display = 'block';
  btnText.style.display = 'none';

  var caption = document.getElementById('caption').value.trim();

  function getBlob(cb) {
    if (rotation === 0) { cb(selectedFile); return; }
    var img = new Image();
    img.onload = function() {
      var canvas = document.createElement('canvas');
      var rad = rotation * Math.PI / 180;
      if (rotation === 90 || rotation === 270) {
        canvas.width = img.height; canvas.height = img.width;
      } else {
        canvas.width = img.width; canvas.height = img.height;
      }
      var ctx = canvas.getContext('2d');
      ctx.translate(canvas.width / 2, canvas.height / 2);
      ctx.rotate(rad);
      ctx.drawImage(img, -img.width / 2, -img.height / 2);
      canvas.toBlob(function(blob) { cb(blob); }, 'image/jpeg', 0.92);
    };
    img.src = document.getElementById('preview-img').src;
  }

  getBlob(function(blob) {
    var ref = storage.ref('posts/' + currentUser.uid + '/' + Date.now() + '.jpg');
    ref.put(blob).then(function(snap) {
      return snap.ref.getDownloadURL();
    }).then(function(url) {
      return db.collection('posts').add({
        uid: currentUser.uid,
        name: currentUser.displayName || '',
        username: currentUser.email ? currentUser.email.split('@')[0] : '',
        photo: currentUser.photoURL || '',
        caption: caption,
        imageUrl: url,
        emoji: '',
        likes: 0, shares: 0, comments: 0,
        likedBy: {},
        createdAt: FieldValue.serverTimestamp()
      });
    }).then(function() {
      db.collection('users').doc(currentUser.uid).update({ posts: FieldValue.increment(1) }).catch(function(){});
      toast(T[lang].success, 'ok');
      setTimeout(function() { window.location.href = 'index.html'; }, 1500);
    }).catch(function(err) {
      console.error(err);
      toast(T[lang].errFail, 'err');
      btn.disabled = false;
      spinner.style.display = 'none';
      btnText.style.display = '';
    });
  });
}

// Auth
auth.onAuthStateChanged(function(user) {
  if (user) {
    currentUser = user;
  } else {
    window.location.href = 'login.html';
  }
});

</script>
</body>
</html>
