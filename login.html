<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vistago — تسجيل الدخول</title>
<link rel="icon" href="vistago-icon.svg" type="image/svg+xml">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<style>
  :root {
    --bg: #0f0f0f; --surface: #1a1a1a; --surface2: #242424;
    --border: #2e2e2e; --text: #f0f0f0; --text2: #aaaaaa;
    --accent: #6c63ff; --accent2: #a78bfa; --danger: #ef4444; --radius: 14px;
  }
  :root.light {
    --bg: #f4f4f8; --surface: #ffffff; --surface2: #efefef;
    --border: #dcdcdc; --text: #111111; --text2: #666666;
    --accent: #6c63ff; --accent2: #5548e0; --danger: #ef4444;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', Tahoma, sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }

  /* LANG BAR */
  .lang-bar { position: fixed; top: 14px; right: 16px; display: flex; gap: 6px; z-index: 10; }
  [dir="ltr"] .lang-bar { right: auto; left: 16px; }
  .lang-btn {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text2); border-radius: 20px; padding: 4px 12px;
    font-size: 0.78rem; cursor: pointer; transition: all .2s;
  }
  .lang-btn.active, .lang-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }

  /* CARD */
  .auth-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 36px 32px;
    width: 100%; max-width: 400px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.3);
  }
  .auth-logo { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 24px; }
  .auth-logo img { width: 36px; height: 36px; }
  .auth-logo span { font-size: 1.5rem; font-weight: 800; }
  .auth-title { font-size: 1.3rem; font-weight: 700; text-align: center; margin-bottom: 6px; }
  .auth-sub { font-size: 0.88rem; color: var(--text2); text-align: center; margin-bottom: 24px; }

  /* ALERT */
  .alert-msg {
    display: none; padding: 10px 14px; border-radius: 10px;
    font-size: 0.85rem; margin-bottom: 16px; text-align: center;
  }
  .alert-error { background: rgba(239,68,68,0.12); color: #f87171; border: 1px solid rgba(239,68,68,0.3); }
  .alert-success { background: rgba(34,197,94,0.12); color: #4ade80; border: 1px solid rgba(34,197,94,0.3); }

  /* GOOGLE BTN */
  .google-btn {
    width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px;
    background: var(--surface2); border: 1px solid var(--border); color: var(--text);
    border-radius: 10px; padding: 11px; font-size: 0.92rem; cursor: pointer;
    transition: all .2s; margin-bottom: 16px;
  }
  .google-btn:hover { border-color: var(--accent); background: var(--bg); }
  .google-icon { width: 20px; height: 20px; }

  /* DIVIDER */
  .divider { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; color: var(--text2); font-size: 0.8rem; }
  .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  /* FORM */
  .form-group { margin-bottom: 14px; }
  .form-control {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; padding: 11px 14px; color: var(--text);
    font-size: 0.9rem; outline: none; transition: border-color .2s;
  }
  .form-control:focus { border-color: var(--accent); }
  .form-control.valid { border-color: #22c55e; }
  .form-control.invalid { border-color: var(--danger); }

  /* USERNAME STATUS */
  .username-status { font-size: 0.78rem; margin-top: 5px; padding-right: 4px; }
  .username-status.available { color: #22c55e; }
  .username-status.taken { color: var(--danger); }
  .username-status.checking { color: var(--text2); }

  /* TERMS */
  .terms-row { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 16px; font-size: 0.82rem; color: var(--text2); }
  .terms-row input[type="checkbox"] { margin-top: 2px; accent-color: var(--accent); width: 15px; height: 15px; flex-shrink: 0; }
  .terms-row a { color: var(--accent2); text-decoration: underline; }

  /* HINT */
  .login-hint { font-size: 0.78rem; color: var(--text2); margin-bottom: 14px; text-align: center; }

  /* SUBMIT BTN */
  .submit-btn {
    width: 100%; background: var(--accent); color: #fff; border: none;
    border-radius: 10px; padding: 12px; font-size: 0.95rem; font-weight: 600;
    cursor: pointer; transition: background .2s; margin-bottom: 16px;
  }
  .submit-btn:hover { background: var(--accent2); }

  /* SWITCH */
  .switch-text { text-align: center; font-size: 0.85rem; color: var(--text2); }
  .switch-text a { color: var(--accent2); cursor: pointer; font-weight: 600; }
  .switch-text a:hover { text-decoration: underline; }
</style>
</head>
<body>

<!-- LANG BAR -->
<div class="lang-bar">
  <button class="lang-btn active" id="btn-ar" onclick="setLang('ar')">🇸🇦 العربية</button>
  <button class="lang-btn" id="btn-en" onclick="setLang('en')">🇬🇧 English</button>
</div>

<div class="auth-card">
  <div class="auth-logo">
    <img src="vistago-icon.svg" alt="V">
    <span>Vistago</span>
  </div>
  <div class="auth-title" id="auth-title">مرحباً بك</div>
  <div class="auth-sub" id="auth-sub">شارك لحظاتك مع العالم</div>
  <div class="alert-msg" id="alert-msg"></div>

  <!-- GOOGLE -->
  <button class="google-btn" onclick="signInWithGoogle()">
    <svg class="google-icon" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
    <span id="google-btn-text">تسجيل الدخول بواسطة Google</span>
  </button>

  <div class="divider"><span id="divider-text">أو</span></div>

  <!-- LOGIN FORM -->
  <div id="login-form">
    <div class="login-hint" id="login-hint">يمكنك تسجيل الدخول بالبريد الإلكتروني أو اسم المستخدم</div>
    <div class="form-group">
      <input class="form-control" id="login-identifier" type="text" placeholder="البريد الإلكتروني أو اسم المستخدم" onkeydown="if(event.key==='Enter')loginWithEmail()">
    </div>
    <div class="form-group">
      <input class="form-control" id="login-password" type="password" placeholder="كلمة المرور" onkeydown="if(event.key==='Enter')loginWithEmail()">
    </div>
    <button class="submit-btn" id="login-btn" onclick="loginWithEmail()">تسجيل الدخول</button>
    <div class="switch-text">
      <span id="no-account-text">ليس لديك حساب؟</span>
      <a id="go-register" onclick="showRegister()"> إنشاء حساب</a>
    </div>
  </div>

  <!-- REGISTER FORM -->
  <div id="register-form" style="display:none">
    <div class="form-group">
      <input class="form-control" id="reg-displayname" type="text" placeholder="الاسم المعروض (مثال: سالم)">
    </div>
    <div class="form-group">
      <input class="form-control" id="reg-username" type="text" placeholder="اسم المستخدم (مثال: salim123)" oninput="checkUsername()">
      <div class="username-status" id="username-status"></div>
    </div>
    <div class="form-group">
      <input class="form-control" id="reg-email" type="email" placeholder="البريد الإلكتروني">
    </div>
    <div class="form-group">
      <input class="form-control" id="reg-password" type="password" placeholder="كلمة المرور">
    </div>
    <div class="form-group">
      <input class="form-control" id="reg-confirm" type="password" placeholder="تأكيد كلمة المرور">
    </div>
    <div class="terms-row">
      <input type="checkbox" id="agree-terms">
      <label for="agree-terms">
        <span id="agree-text">أوافق على </span>
        <a href="terms.html" target="_blank" id="terms-link">الشروط والأحكام وسياسة الخصوصية</a>
      </label>
    </div>
    <button class="submit-btn" id="register-btn" onclick="registerWithEmail()">إنشاء حساب</button>
    <div class="switch-text">
      <span id="have-account-text">لديك حساب بالفعل؟</span>
      <a id="go-login" onclick="showLogin()"> تسجيل الدخول</a>
    </div>
  </div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
const tr = {
  ar:{dir:"rtl",
    authTitle:"مرحباً بك", authSub:"شارك لحظاتك مع العالم",
    googleBtn:"تسجيل الدخول بواسطة Google", divider:"أو",
    loginIdentifier:"البريد الإلكتروني أو اسم المستخدم",
    loginHint:"يمكنك تسجيل الدخول بالبريد الإلكتروني أو اسم المستخدم",
    loginPassword:"كلمة المرور",
    loginBtn:"تسجيل الدخول", noAccount:"ليس لديك حساب؟", goRegister:"إنشاء حساب",
    regDisplayName:"الاسم المعروض (مثال: سالم)", regUsername:"اسم المستخدم (مثال: salim123)",
    regEmail:"البريد الإلكتروني", regPassword:"كلمة المرور", regConfirm:"تأكيد كلمة المرور",
    agreeText:"أوافق على ", termsLink:"الشروط والأحكام وسياسة الخصوصية",
    registerBtn:"إنشاء حساب", haveAccount:"لديك حساب بالفعل؟", goLogin:"تسجيل الدخول",
    errFill:"يرجى ملء جميع الحقول",
    errPassword:"كلمة المرور يجب أن تكون 6 أحرف على الأقل",
    errMatch:"كلمة المرور غير متطابقة",
    errGoogle:"فشل تسجيل الدخول بواسطة Google",
    errUsernameTaken:"اسم المستخدم مأخوذ بالفعل",
    errUsernameInvalid:"اسم المستخدم يجب أن يكون حروف وأرقام فقط",
    errUsernameShort:"اسم المستخدم يجب أن يكون 3 أحرف على الأقل",
    errTerms:"يجب الموافقة على الشروط والأحكام",
    errUserNotFound:"اسم المستخدم غير موجود",
    errWrongPassword:"كلمة المرور غير صحيحة",
    successRegister:"تم إنشاء الحساب بنجاح! 🎉",
    successLogin:"تم تسجيل الدخول بنجاح! 👋",
    usernameAvailable:"✅ اسم المستخدم متاح",
    usernameTaken:"❌ اسم المستخدم مأخوذ",
    usernameChecking:"جاري التحقق..."
  },
  en:{dir:"ltr",
    authTitle:"Welcome Back", authSub:"Share your moments with the world",
    googleBtn:"Sign in with Google", divider:"or",
    loginIdentifier:"Email address or username",
    loginHint:"You can sign in with your email or username",
    loginPassword:"Password",
    loginBtn:"Sign In", noAccount:"Don't have an account?", goRegister:"Create account",
    regDisplayName:"Display name (e.g. Salim)", regUsername:"Username (e.g. salim123)",
    regEmail:"Email address", regPassword:"Password", regConfirm:"Confirm password",
    agreeText:"I agree to the ", termsLink:"Terms & Conditions and Privacy Policy",
    registerBtn:"Create Account", haveAccount:"Already have an account?", goLogin:"Sign In",
    errFill:"Please fill in all fields",
    errPassword:"Password must be at least 6 characters",
    errMatch:"Passwords do not match",
    errGoogle:"Google sign in failed",
    errUsernameTaken:"Username is already taken",
    errUsernameInvalid:"Username must be letters and numbers only",
    errUsernameShort:"Username must be at least 3 characters",
    errTerms:"You must agree to the Terms & Conditions",
    errUserNotFound:"Username not found",
    errWrongPassword:"Wrong password",
    successRegister:"Account created successfully! 🎉",
    successLogin:"Signed in successfully! 👋",
    usernameAvailable:"✅ Username available",
    usernameTaken:"❌ Username already taken",
    usernameChecking:"Checking..."
  }
};

let lang = "ar";
let usernameAvailable = false;
let checkTimer = null;

function setLang(l){
  lang=l; localStorage.setItem("vistagoLang",l);
  const s=tr[l];
  document.documentElement.setAttribute("dir",s.dir);
  document.documentElement.setAttribute("lang",l);
  document.getElementById("auth-title").textContent=s.authTitle;
  document.getElementById("auth-sub").textContent=s.authSub;
  document.getElementById("google-btn-text").textContent=s.googleBtn;
  document.getElementById("divider-text").textContent=s.divider;
  document.getElementById("login-identifier").placeholder=s.loginIdentifier;
  document.getElementById("login-hint").textContent=s.loginHint;
  document.getElementById("login-password").placeholder=s.loginPassword;
  document.getElementById("login-btn").textContent=s.loginBtn;
  document.getElementById("no-account-text").textContent=s.noAccount;
  document.getElementById("go-register").textContent=s.goRegister;
  document.getElementById("reg-displayname").placeholder=s.regDisplayName;
  document.getElementById("reg-username").placeholder=s.regUsername;
  document.getElementById("reg-email").placeholder=s.regEmail;
  document.getElementById("reg-password").placeholder=s.regPassword;
  document.getElementById("reg-confirm").placeholder=s.regConfirm;
  document.getElementById("agree-text").textContent=s.agreeText;
  document.getElementById("terms-link").textContent=s.termsLink;
  document.getElementById("register-btn").textContent=s.registerBtn;
  document.getElementById("have-account-text").textContent=s.haveAccount;
  document.getElementById("go-login").textContent=s.goLogin;
  document.getElementById("btn-ar").classList.toggle("active",l==="ar");
  document.getElementById("btn-en").classList.toggle("active",l==="en");
}

const savedLang = localStorage.getItem("vistagoLang");
if(savedLang) setLang(savedLang);

// Apply saved theme
const savedTheme = localStorage.getItem("vistagoTheme");
if(savedTheme === "light") document.documentElement.classList.add("light");

function showAlert(msg, type){
  const el = document.getElementById("alert-msg");
  el.textContent = msg;
  el.className = "alert-msg " + (type==="error" ? "alert-error" : "alert-success");
  el.style.display = "block";
  setTimeout(()=>el.style.display="none", 4000);
}

function showRegister(){
  document.getElementById("login-form").style.display = "none";
  document.getElementById("register-form").style.display = "block";
  document.getElementById("auth-title").textContent = tr[lang].goRegister;
  document.getElementById("auth-sub").textContent = tr[lang].authSub;
}

function showLogin(){
  document.getElementById("register-form").style.display = "none";
  document.getElementById("login-form").style.display = "block";
  document.getElementById("auth-title").textContent = tr[lang].authTitle;
  document.getElementById("auth-sub").textContent = tr[lang].authSub;
}

function checkUsername(){
  const input = document.getElementById("reg-username");
  const status = document.getElementById("username-status");
  const val = input.value.trim().toLowerCase();
  usernameAvailable = false;
  input.className = "form-control";
  if(val.length===0){ status.textContent=""; return; }
  if(val.length<3){ status.textContent=tr[lang].errUsernameShort; status.className="username-status taken"; input.className="form-control invalid"; return; }
  if(!/^[a-zA-Z0-9_]+$/.test(val)){ status.textContent=tr[lang].errUsernameInvalid; status.className="username-status taken"; input.className="form-control invalid"; return; }
  status.textContent = tr[lang].usernameChecking;
  status.className = "username-status checking";
  clearTimeout(checkTimer);
  checkTimer = setTimeout(()=>checkUsernameFirebase(val), 600);
}

firebase.initializeApp({
  apiKey:"AIzaSyA4vNgF3NBWxjQfx_feHpsoIMdswlzUegA",
  authDomain:"social-media-app-da2cd.firebaseapp.com",
  projectId:"social-media-app-da2cd",
  storageBucket:"social-media-app-da2cd.firebasestorage.app",
  messagingSenderId:"41413182238",
  appId:"1:41413182238:web:bbf664b131279ec4bd3f0f"
});
const auth = firebase.auth();
const db = firebase.firestore();
const googleProvider = new firebase.auth.GoogleAuthProvider();

function checkUsernameFirebase(username){
  const input = document.getElementById("reg-username");
  const status = document.getElementById("username-status");
  db.collection("usernames").doc(username).get().then(snap=>{
    if(!snap.exists){
      usernameAvailable = true;
      status.textContent = tr[lang].usernameAvailable;
      status.className = "username-status available";
      input.className = "form-control valid";
    } else {
      usernameAvailable = false;
      status.textContent = tr[lang].usernameTaken;
      status.className = "username-status taken";
      input.className = "form-control invalid";
    }
  }).catch(()=>{ status.textContent=""; usernameAvailable=false; });
}

function saveUser(user, username, displayName){
  const name = displayName || user.displayName || username || "";
  return db.collection("users").doc(user.uid).set({
    uid: user.uid,
    name: name,
    username: username||"",
    email: user.email||"",
    photo: user.photoURL||"",
    bio:"", followers:0, following:0, posts:0,
    createdAt: new Date()
  },{merge:true}).then(()=>{
    if(username){
      return db.collection("usernames").doc(username).set({username, uid:user.uid});
    }
  });
}

function signInWithGoogle(){
  auth.signInWithPopup(googleProvider).then(result=>{
    const user = result.user;
    return db.collection("users").doc(user.uid).get().then(snap=>{
      if(!snap.exists){
        const username = user.email.split("@")[0].toLowerCase().replace(/[^a-z0-9_]/g,"");
        return saveUser(user, username);
      }
    });
  }).then(()=>{
    showAlert(tr[lang].successLogin,"success");
    setTimeout(()=>window.location.href="index.html",1500);
  }).catch(()=>{ showAlert(tr[lang].errGoogle,"error"); });
}

function loginWithEmail(){
  const identifier = document.getElementById("login-identifier").value.trim();
  const password = document.getElementById("login-password").value.trim();
  if(!identifier||!password){ showAlert(tr[lang].errFill,"error"); return; }
  const isEmail = identifier.includes("@");
  if(isEmail){
    auth.signInWithEmailAndPassword(identifier,password).then(()=>{
      showAlert(tr[lang].successLogin,"success");
      setTimeout(()=>window.location.href="index.html",1500);
    }).catch(err=>{ showAlert(err.message,"error"); });
  } else {
    db.collection("usernames").doc(identifier.toLowerCase()).get().then(snap=>{
      if(!snap.exists){ showAlert(tr[lang].errUserNotFound,"error"); return; }
      const uid = snap.data().uid;
      return db.collection("users").doc(uid).get().then(userSnap=>{
        if(!userSnap.exists){ showAlert(tr[lang].errUserNotFound,"error"); return; }
        const email = userSnap.data().email;
        return auth.signInWithEmailAndPassword(email,password).then(()=>{
          showAlert(tr[lang].successLogin,"success");
          setTimeout(()=>window.location.href="index.html",1500);
        });
      });
    }).catch(err=>{ showAlert(err.message,"error"); });
  }
}

function registerWithEmail(){
  const displayName = document.getElementById("reg-displayname").value.trim();
  const username = document.getElementById("reg-username").value.trim().toLowerCase();
  const email = document.getElementById("reg-email").value.trim();
  const password = document.getElementById("reg-password").value.trim();
  const confirm = document.getElementById("reg-confirm").value.trim();
  const agreed = document.getElementById("agree-terms").checked;

  if(!displayName||!username||!email||!password||!confirm){ showAlert(tr[lang].errFill,"error"); return; }
  if(password.length<6){ showAlert(tr[lang].errPassword,"error"); return; }
  if(password!==confirm){ showAlert(tr[lang].errMatch,"error"); return; }
  if(!usernameAvailable){ showAlert(tr[lang].errUsernameTaken,"error"); return; }
  if(!agreed){ showAlert(tr[lang].errTerms,"error"); return; }

  auth.createUserWithEmailAndPassword(email,password).then(result=>{
    return result.user.updateProfile({displayName: displayName}).then(()=>{
      return saveUser(result.user, username, displayName);
    });
  }).then(()=>{
    showAlert(tr[lang].successRegister,"success");
    setTimeout(()=>window.location.href="index.html",1500);
  }).catch(err=>{ showAlert(err.message,"error"); });
}
</script>
</body>
</html>
