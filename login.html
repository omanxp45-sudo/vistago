<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vistago — تسجيل الدخول</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:linear-gradient(135deg,#1DA1F2,#0077b6);
  min-height:100vh;
  font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
}
.lang-bar{
  padding:12px 20px;position:absolute;
  top:0;left:0;right:0;z-index:10;
  display:flex;justify-content:flex-end;
}
.lang-btn{
  border:1px solid rgba(255,255,255,0.5);
  background:rgba(255,255,255,0.15);
  color:#fff;border-radius:20px;
  padding:4px 16px;font-size:0.85rem;
  margin:0 4px;cursor:pointer;transition:all 0.2s;
}
.lang-btn.active{background:rgba(255,255,255,0.35);font-weight:600;}
.auth-wrapper{
  display:flex;justify-content:center;
  align-items:center;min-height:100vh;
  padding:80px 16px 30px;
}
.auth-card{
  background:#fff;border-radius:20px;
  padding:40px;width:100%;max-width:420px;
  box-shadow:0 20px 60px rgba(0,0,0,0.2);
}
.auth-logo{
  font-size:2rem;font-weight:800;
  text-align:center;color:#1DA1F2;
  margin-bottom:4px;letter-spacing:-1px;
}
.auth-title{
  font-size:1.4rem;font-weight:700;
  color:#1a1a2e;text-align:center;margin-bottom:4px;
}
.auth-sub{
  font-size:0.9rem;color:#6c757d;
  text-align:center;margin-bottom:28px;
}
.btn-google{
  background:#fff;border:1.5px solid #dee2e6;
  color:#343a40;border-radius:12px;padding:13px;
  width:100%;font-size:1rem;font-weight:500;
  cursor:pointer;transition:all 0.2s;
  display:flex;align-items:center;
  justify-content:center;gap:10px;margin-bottom:8px;
}
.btn-google:hover{background:#f8f9fa;}
.divider{
  display:flex;align-items:center;
  gap:10px;margin:20px 0;
  color:#adb5bd;font-size:0.85rem;
}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:#dee2e6;}
.form-control{
  border-radius:12px;padding:13px 16px;
  border:1.5px solid #dee2e6;font-size:0.95rem;
  transition:all 0.2s;width:100%;
  margin-bottom:12px;outline:none;
}
.form-control:focus{border-color:#1DA1F2;box-shadow:0 0 0 3px rgba(29,161,242,0.1);}
.form-control.valid{border-color:#28a745;}
.form-control.invalid{border-color:#dc3545;}
.username-status{
  font-size:0.8rem;margin-top:-8px;
  margin-bottom:10px;padding:0 4px;
}
.username-status.available{color:#28a745;}
.username-status.taken{color:#dc3545;}
.username-status.checking{color:#aaa;}
.terms-row{
  display:flex;align-items:flex-start;gap:10px;
  margin-bottom:16px;padding:12px;
  background:#f8f9fa;border-radius:12px;
}
.terms-row input[type=checkbox]{
  width:18px;height:18px;
  margin-top:2px;cursor:pointer;
  accent-color:#1DA1F2;flex-shrink:0;
}
.terms-row label{
  font-size:0.88rem;color:#555;
  cursor:pointer;line-height:1.5;
}
.terms-row a{color:#1DA1F2;font-weight:600;}
.btn-submit{
  background:#1DA1F2;border:none;
  border-radius:12px;padding:13px;
  font-size:1rem;font-weight:600;
  width:100%;color:#fff;cursor:pointer;
  transition:opacity 0.2s;margin-bottom:16px;
}
.btn-submit:hover{opacity:0.9;}
.btn-submit:disabled{opacity:0.6;cursor:not-allowed;}
.toggle-link{
  color:#1DA1F2;cursor:pointer;
  text-decoration:underline;font-weight:500;
}
.alert-msg{
  border-radius:12px;padding:10px 16px;
  font-size:0.9rem;margin-bottom:16px;
  display:none;text-align:center;
}
.alert-error{background:#fff0f0;color:#dc3545;border:1px solid #f5c6cb;}
.alert-success{background:#f0fff4;color:#198754;border:1px solid #b7dfc5;}
.switch-text{text-align:center;font-size:0.9rem;color:#6c757d;}
</style>
</head>
<body>

<!-- Language Bar -->
<div class="lang-bar">
  <button id="btn-ar" class="lang-btn active" onclick="setLang('ar')">🇸🇦 العربية</button>
  <button id="btn-en" class="lang-btn" onclick="setLang('en')">🇬🇧 English</button>
</div>

<!-- Auth Card -->
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-logo">Vistago</div>
    <div class="auth-title" id="auth-title">مرحباً بك</div>
    <div class="auth-sub" id="auth-sub">شارك لحظاتك مع العالم</div>

    <!-- Alert -->
    <div id="alert-msg" class="alert-msg"></div>

    <!-- Google Button -->
    <button class="btn-google" onclick="signInWithGoogle()">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="22">
      <span id="google-btn-text">تسجيل الدخول بواسطة Google</span>
    </button>

    <!-- Divider -->
    <div class="divider"><span id="divider-text">أو</span></div>

    <!-- Login Form -->
    <div id="login-form">
      <input id="login-email" type="email" class="form-control" placeholder="البريد الإلكتروني">
      <input id="login-password" type="password" class="form-control" placeholder="كلمة المرور">
      <button class="btn-submit" onclick="loginWithEmail()" id="login-btn">تسجيل الدخول</button>
      <div class="switch-text">
        <span id="no-account-text">ليس لديك حساب؟</span>
        <span class="toggle-link" onclick="showRegister()" id="go-register"> إنشاء حساب</span>
      </div>
    </div>

    <!-- Register Form -->
    <div id="register-form" style="display:none;">
      <input id="reg-name" type="text" class="form-control" placeholder="الاسم الكامل">
      <input id="reg-username" type="text" class="form-control" placeholder="اسم المستخدم (مثال: salim123)" oninput="checkUsername()">
      <div class="username-status" id="username-status"></div>
      <input id="reg-email" type="email" class="form-control" placeholder="البريد الإلكتروني">
      <input id="reg-password" type="password" class="form-control" placeholder="كلمة المرور">
      <input id="reg-confirm" type="password" class="form-control" placeholder="تأكيد كلمة المرور">

      <!-- Terms Checkbox -->
      <div class="terms-row">
        <input type="checkbox" id="agree-terms">
        <label for="agree-terms">
          <span id="agree-text">أوافق على </span>
          <a href="terms.html" target="_blank" id="terms-link">الشروط والأحكام وسياسة الخصوصية</a>
        </label>
      </div>

      <button class="btn-submit" onclick="registerWithEmail()" id="register-btn">إنشاء حساب</button>
      <div class="switch-text">
        <span id="have-account-text">لديك حساب بالفعل؟</span>
        <span class="toggle-link" onclick="showLogin()" id="go-login"> تسجيل الدخول</span>
      </div>
    </div>

  </div>
</div>

<script>
const tr={
  ar:{dir:"rtl",
    authTitle:"مرحباً بك",authSub:"شارك لحظاتك مع العالم",
    googleBtn:"تسجيل الدخول بواسطة Google",divider:"أو",
    loginEmail:"البريد الإلكتروني",loginPassword:"كلمة المرور",
    loginBtn:"تسجيل الدخول",noAccount:"ليس لديك حساب؟",goRegister:"إنشاء حساب",
    regName:"الاسم الكامل",regUsername:"اسم المستخدم (مثال: salim123)",
    regEmail:"البريد الإلكتروني",regPassword:"كلمة المرور",regConfirm:"تأكيد كلمة المرور",
    agreeText:"أوافق على ",termsLink:"الشروط والأحكام وسياسة الخصوصية",
    registerBtn:"إنشاء حساب",haveAccount:"لديك حساب بالفعل؟",goLogin:"تسجيل الدخول",
    errFill:"يرجى ملء جميع الحقول",
    errPassword:"كلمة المرور يجب أن تكون 6 أحرف على الأقل",
    errMatch:"كلمة المرور غير متطابقة",
    errGoogle:"فشل تسجيل الدخول بواسطة Google",
    errUsernameTaken:"اسم المستخدم مأخوذ بالفعل",
    errUsernameInvalid:"اسم المستخدم يجب أن يكون حروف وأرقام فقط",
    errUsernameShort:"اسم المستخدم يجب أن يكون 3 أحرف على الأقل",
    errTerms:"يجب الموافقة على الشروط والأحكام",
    successRegister:"تم إنشاء الحساب بنجاح! 🎉",
    successLogin:"تم تسجيل الدخول بنجاح! 👋",
    usernameAvailable:"✅ اسم المستخدم متاح",
    usernameTaken:"❌ اسم المستخدم مأخوذ",
    usernameChecking:"جاري التحقق..."},
  en:{dir:"ltr",
    authTitle:"Welcome Back",authSub:"Share your moments with the world",
    googleBtn:"Sign in with Google",divider:"or",
    loginEmail:"Email address",loginPassword:"Password",
    loginBtn:"Sign In",noAccount:"Don't have an account?",goRegister:"Create account",
    regName:"Full name",regUsername:"Username (e.g. salim123)",
    regEmail:"Email address",regPassword:"Password",regConfirm:"Confirm password",
    agreeText:"I agree to the ",termsLink:"Terms & Conditions and Privacy Policy",
    registerBtn:"Create Account",haveAccount:"Already have an account?",goLogin:"Sign In",
    errFill:"Please fill in all fields",
    errPassword:"Password must be at least 6 characters",
    errMatch:"Passwords do not match",
    errGoogle:"Google sign in failed",
    errUsernameTaken:"Username is already taken",
    errUsernameInvalid:"Username must be letters and numbers only",
    errUsernameShort:"Username must be at least 3 characters",
    errTerms:"You must agree to the Terms & Conditions",
    successRegister:"Account created successfully! 🎉",
    successLogin:"Signed in successfully! 👋",
    usernameAvailable:"✅ Username available",
    usernameTaken:"❌ Username already taken",
    usernameChecking:"Checking..."}
};

let lang="ar";
let usernameAvailable=false;
let checkTimer=null;

function setLang(l){
  lang=l;
  localStorage.setItem("vistagoLang",l);
  const s=tr[l];
  document.documentElement.setAttribute("dir",s.dir);
  document.documentElement.setAttribute("lang",l);
  document.getElementById("auth-title").textContent=s.authTitle;
  document.getElementById("auth-sub").textContent=s.authSub;
  document.getElementById("google-btn-text").textContent=s.googleBtn;
  document.getElementById("divider-text").textContent=s.divider;
  document.getElementById("login-email").placeholder=s.loginEmail;
  document.getElementById("login-password").placeholder=s.loginPassword;
  document.getElementById("login-btn").textContent=s.loginBtn;
  document.getElementById("no-account-text").textContent=s.noAccount;
  document.getElementById("go-register").textContent=s.goRegister;
  document.getElementById("reg-name").placeholder=s.regName;
  document.getElementById("reg-username").placeholder=s.regUsername;
  document.getElementById("reg-email").placeholder=s.regEmail;
  document.getElementById("reg-password").placeholder=s.regPassword;
  document.getElementById("reg-confirm").placeholder=s.regConfirm;
  document.getElementById("agree-text").textContent=s.agreeText;
  document.getElementById("terms-link").textContent=s.termsLink;
  document.getElementById("register-btn").textContent=s.registerBtn;
  document.getElementById("have-account-text").textContent=s.haveAccount;
  document.getElementById("go-login").textContent=s.goLogin;
  document.getElementById("btn-ar").classList.toggle("active",l==="ar");
  document.getElementById("btn-en").classList.toggle("active",l==="en");
}

// Load saved language
const savedLang=localStorage.getItem("vistagoLang");
if(savedLang) setLang(savedLang);

function showAlert(msg,type){
  const el=document.getElementById("alert-msg");
  el.textContent=msg;
  el.className="alert-msg "+(type==="error"?"alert-error":"alert-success");
  el.style.display="block";
  setTimeout(()=>el.style.display="none",4000);
}

function showRegister(){
  document.getElementById("login-form").style.display="none";
  document.getElementById("register-form").style.display="block";
  document.getElementById("auth-title").textContent=tr[lang].goRegister;
  document.getElementById("auth-sub").textContent=tr[lang].authSub;
}

function showLogin(){
  document.getElementById("register-form").style.display="none";
  document.getElementById("login-form").style.display="block";
  document.getElementById("auth-title").textContent=tr[lang].authTitle;
  document.getElementById("auth-sub").textContent=tr[lang].authSub;
}

function checkUsername(){
  const input=document.getElementById("reg-username");
  const status=document.getElementById("username-status");
  const val=input.value.trim().toLowerCase();
  usernameAvailable=false;
  input.className="form-control";
  if(val.length===0){status.textContent="";return;}
  if(val.length<3){
    status.textContent=tr[lang].errUsernameShort;
    status.className="username-status taken";
    input.className="form-control invalid";
    return;
  }
  if(!/^[a-zA-Z0-9_]+$/.test(val)){
    status.textContent=tr[lang].errUsernameInvalid;
    status.className="username-status taken";
    input.className="form-control invalid";
    return;
  }
  status.textContent=tr[lang].usernameChecking;
  status.className="username-status checking";
  clearTimeout(checkTimer);
  checkTimer=setTimeout(()=>checkUsernameFirebase(val),600);
}
</script>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getAuth, signInWithPopup, GoogleAuthProvider, createUserWithEmailAndPassword, signInWithEmailAndPassword, updateProfile } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const app=initializeApp({
  apiKey:"AIzaSyA4vNgF3NBWxjQfx_feHpsoIMdswlzUegA",
  authDomain:"social-media-app-da2cd.firebaseapp.com",
  projectId:"social-media-app-da2cd",
  storageBucket:"social-media-app-da2cd.firebasestorage.app",
  messagingSenderId:"41413182238",
  appId:"1:41413182238:web:bbf664b131279ec4bd3f0f"
});

const auth=getAuth(app);
const db=getFirestore(app);
const googleProvider=new GoogleAuthProvider();

window.checkUsernameFirebase=async function(username){
  const input=document.getElementById("reg-username");
  const status=document.getElementById("username-status");
  try{
    const q=query(collection(db,"usernames"),where("username","==",username));
    const snap=await getDocs(q);
    if(snap.empty){
      usernameAvailable=true;
      status.textContent=tr[lang].usernameAvailable;
      status.className="username-status available";
      input.className="form-control valid";
    } else {
      usernameAvailable=false;
      status.textContent=tr[lang].usernameTaken;
      status.className="username-status taken";
      input.className="form-control invalid";
    }
  }catch(e){status.textContent="";}
}

async function saveUser(user,name,username){
  await setDoc(doc(db,"users",user.uid),{
    uid:user.uid,
    name:name||user.displayName,
    username:username||user.uid,
    email:user.email,
    photo:user.photoURL||"",
    bio:"",followers:0,following:0,posts:0,
    createdAt:new Date()
  },{merge:true});
  if(username){
    await setDoc(doc(db,"usernames",username),{username,uid:user.uid});
  }
}

window.signInWithGoogle=async function(){
  try{
    const result=await signInWithPopup(auth,googleProvider);
    const user=result.user;
    const userDoc=await getDoc(doc(db,"users",user.uid));
    if(!userDoc.exists()){
      const username=user.email.split("@")[0].toLowerCase().replace(/[^a-z0-9_]/g,"");
      await saveUser(user,user.displayName,username);
    }
    showAlert(tr[lang].successLogin,"success");
    setTimeout(()=>window.location.href="index.html",1500);
  }catch(e){
    showAlert(tr[lang].errGoogle,"error");
  }
}

window.loginWithEmail=async function(){
  const email=document.getElementById("login-email").value.trim();
  const password=document.getElementById("login-password").value.trim();
  if(!email||!password){showAlert(tr[lang].errFill,"error");return;}
  try{
    await signInWithEmailAndPassword(auth,email,password);
    showAlert(tr[lang].successLogin,"success");
    setTimeout(()=>window.location.href="index.html",1500);
  }catch(e){
    showAlert(e.message,"error");
  }
}

window.registerWithEmail=async function(){
  const name=document.getElementById("reg-name").value.trim();
  const username=document.getElementById("reg-username").value.trim().toLowerCase();
  const email=document.getElementById("reg-email").value.trim();
  const password=document.getElementById("reg-password").value.trim();
  const confirm=document.getElementById("reg-confirm").value.trim();
  const agreed=document.getElementById("agree-terms").checked;

  if(!name||!username||!email||!password||!confirm){showAlert(tr[lang].errFill,"error");return;}
  if(password.length<6){showAlert(tr[lang].errPassword,"error");return;}
  if(password!==confirm){showAlert(tr[lang].errMatch,"error");return;}
  if(!usernameAvailable){showAlert(tr[lang].errUsernameTaken,"error");return;}
  if(!agreed){showAlert(tr[lang].errTerms,"error");return;}

  try{
    const result=await createUserWithEmailAndPassword(auth,email,password);
    await updateProfile(result.user,{displayName:name});
    await saveUser(result.user,name,username);
    showAlert(tr[lang].successRegister,"success");
    setTimeout(()=>window.location.href="index.html",1500);
  }catch(e){
    showAlert(e.message,"error");
  }
}
</script>

</body>
</html>
